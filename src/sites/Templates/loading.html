<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>認証処理中...</title>

  <link rel="icon" href="/static/favicon.ico">
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      text-align: center;
      background: rgb(0, 0, 0);
      color: #fff;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    h1 {
      font-size: 1.5rem;
      word-wrap: break-word;
      margin-bottom: 20px;
    }

    h3 {
      font-size: 1.1rem;
      font-weight: normal;
      line-height: 1.6;
      color: #ccc;
    }

    .cf-turnstile {
      margin: 20px auto;
      max-width: 100%;
    }

    .loader {
      margin: 30px auto;
      border: 5px solid #333;
      border-top: 5px solid #7289da;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .content-container {
      width: 100%;
      max-width: 400px;
      z-index: 1;
    }
  </style>
</head>

<body>
  <div id="particles-js"></div>

  <div class="content-container">
    <div id="return_text">
      <h1>Discord認証を確認しています...</h1>
    </div>

    <div
      class="cf-turnstile"
      data-sitekey="0x4AAAAAACHs-0Jbiq6eDpSZ"
      data-callback="onCaptchaSuccess">
    </div>

    <div class="loader"></div>
    <p id="loader_text">少々お待ちください。</p>
  </div>

  <script>
    const code = "{{ code }}";
    const state = "{{ state }}";

    function onCaptchaSuccess(token) {
      fetch("/invite_auth_backend", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          code,
          state,
          turnstile_token: token
        })
      })
      .then(res => res.json())
      .then(data => {
        const returnText = document.getElementById("return_text");
        if (data.status === "success") {
          returnText.innerHTML =
            `<h1>✅ 認証が完了しました</h1>
             <h3><strong>サーバー管理者からの伝言:</strong><br>${data.message}</h3>`;
        } else {
          returnText.innerHTML = `<h1>❌ ${data.reason}</h1>`;
        }

        const turnstile = document.querySelector(".cf-turnstile");
        const loader = document.querySelector(".loader");
        const loaderText = document.getElementById("loader_text");
        
        if (turnstile) turnstile.remove();
        if (loader) loader.remove();
        if (loaderText) loaderText.remove();
      })
      .catch(err => {
        document.getElementById("return_text").innerHTML =
          `<h1>❌ エラーが発生しました</h1><p style="color:red;">${err}</p>`;
      });
    }

    particlesJS("particles-js", {
      particles: {
        number: { value: 40, density: { enable: true, value_area: 800 } },
        color: { value: "#3498db" },
        shape: { type: "circle" },
        opacity: { value: 0.5 },
        size: { value: 3, random: true },
        line_linked: { enable: true, distance: 120, color: "#3498db", opacity: 0.4, width: 1 },
        move: { enable: true, speed: 1.2 }
      },
      interactivity: {
        detect_on: "canvas",
        events: { onhover: { enable: false }, onclick: { enable: true, mode: "push" } }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
